apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantforge-api
  namespace: quantforge
  labels: { app: quantforge-api, component: api }
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels: { app: quantforge-api }
  template:
    metadata:
      labels: { app: quantforge-api, component: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/theneuralhorizon/quantforge:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8000 }
          envFrom:
            - configMapRef: { name: quantforge-config }
            - secretRef:    { name: quantforge-secrets }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp,   mountPath: /tmp }
            - { name: cache, mountPath: /app/data/cache }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 128Mi }
        - name: cache
          emptyDir: { sizeLimit: 1Gi }
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: quantforge-api
  namespace: quantforge
  labels: { app: quantforge-api }
spec:
  selector: { app: quantforge-api }
  type: ClusterIP
  ports:
    - { name: http, port: 80, targetPort: http, protocol: TCP }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantforge-api
  namespace: quantforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantforge-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: { name: cpu,    target: { type: Utilization, averageUtilization: 70 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 80 } }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      policies: [{ type: Percent, value: 50, periodSeconds: 60 }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: quantforge-api
  namespace: quantforge
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: quantforge-api }
