apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: quantforge
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - "redis-server"
            - "--save"
            - "60"
            - "1"
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - { name: redis, containerPort: 6379 }
          resources:
            requests: { cpu: "50m",  memory: "64Mi" }
            limits:   { cpu: "500m", memory: "384Mi" }
          livenessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 10
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          emptyDir: { sizeLimit: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: quantforge
spec:
  selector: { app: redis }
  ports:
    - { port: 6379, targetPort: redis }
  clusterIP: None  # headless; stable DNS only
