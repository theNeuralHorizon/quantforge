# EXAMPLE — do NOT commit real secrets. Apply via:
#   kubectl create secret generic quantforge-secrets -n quantforge \
#     --from-literal=QUANTFORGE_API_KEYS=$(echo -n 'my-real-key' | sha256sum | awk '{print $1}')
apiVersion: v1
kind: Secret
metadata:
  name: quantforge-secrets
  namespace: quantforge
type: Opaque
stringData:
  # comma-separated SHA-256 hex digests of raw API keys
  QUANTFORGE_API_KEYS: "REPLACE_ME_WITH_REAL_HASHED_KEYS"
