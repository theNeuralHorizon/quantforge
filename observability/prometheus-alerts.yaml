# Prometheus alerting rules — drop this into your Prometheus rules config.
groups:
  - name: quantforge.rules
    rules:
      - alert: QuantForgeAPIDown
        expr: up{job="quantforge-api"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "QuantForge API is down"
          description: "No successful scrape of {{ $labels.instance }} for 2m."

      - alert: QuantForgeHighErrorRate
        expr: sum(rate(qf_requests_total{status=~"5.."}[5m])) / sum(rate(qf_requests_total[5m])) > 0.05
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "5xx error rate > 5%"
          description: "5xx rate is {{ $value | humanizePercentage }}."

      - alert: QuantForgeSlowAPI
        expr: histogram_quantile(0.99, sum(rate(qf_request_latency_seconds_bucket[5m])) by (le)) > 2
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "p99 latency > 2s"

      - alert: QuantForgeCacheLowHitRate
        expr: sum(rate(qf_cache_hits_total[10m])) / (sum(rate(qf_cache_hits_total[10m])) + sum(rate(qf_cache_misses_total[10m]))) < 0.3
        for: 30m
        labels: { severity: info }
        annotations:
          summary: "Cache hit ratio < 30%"
