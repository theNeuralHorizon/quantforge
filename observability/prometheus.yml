global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yaml

scrape_configs:
  - job_name: quantforge-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels: { env: local }
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
