name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run test suite
        run: |
          python -m pytest tests/ -q --tb=short
        env:
          PYTHONPATH: .

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.5.0
      - name: Ruff check
        run: ruff check quantforge/ tests/ --output-format=github

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit + safety
        run: pip install bandit safety
      - name: bandit (python security lint)
        run: bandit -r quantforge/ -ll -q -f txt
        continue-on-error: false
      - name: safety (CVE scan of deps)
        run: safety check -r requirements.txt --full-report
        continue-on-error: true  # advisory db sometimes flaky

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute lowercase image name
        id: img
        # GHCR / OCI require lowercase repository names; github.repository_owner
        # can contain uppercase letters.
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/quantforge" >> "$GITHUB_OUTPUT"
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.name }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  deploy:
    name: Deploy to Render + Vercel
    runs-on: ubuntu-latest
    # Render builds its own image from the Dockerfile, so it's independent of
    # the GHCR push in `docker-build`. Gate the deploy on correctness
    # (tests + lint + security) only.
    needs: [test, lint, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # No permissions needed — we only POST to webhook URLs stored in secrets.
    permissions:
      contents: read
    steps:
      - name: Trigger Render deploy
        # RENDER_DEPLOY_HOOK_URL comes from the Render service's Settings →
        # Deploy Hook. If unset, the step is skipped so forks without the
        # secret don't fail.
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${HOOK:-}" ]; then
            echo "::notice::RENDER_DEPLOY_HOOK_URL not configured; skipping Render deploy."
            exit 0
          fi
          # Fail the job if the hook returns non-2xx.
          http_code=$(curl -sS -o /tmp/render.out -w "%{http_code}" -X POST "$HOOK")
          echo "Render deploy hook returned HTTP $http_code"
          cat /tmp/render.out || true
          case "$http_code" in 2*) ;; *) exit 1 ;; esac
      - name: Trigger Vercel deploy
        # VERCEL_DEPLOY_HOOK_URL comes from Vercel → Project → Settings →
        # Git → Deploy Hooks. Optional: prefer Vercel's native GitHub
        # integration, which auto-deploys on push. This step is a belt-and-
        # braces fallback.
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${HOOK:-}" ]; then
            echo "::notice::VERCEL_DEPLOY_HOOK_URL not configured; skipping Vercel deploy (native integration likely handles it)."
            exit 0
          fi
          http_code=$(curl -sS -o /tmp/vercel.out -w "%{http_code}" -X POST "$HOOK")
          echo "Vercel deploy hook returned HTTP $http_code"
          cat /tmp/vercel.out || true
          case "$http_code" in 2*) ;; *) exit 1 ;; esac

  smoke:
    name: Production smoke test
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - name: Wait for API to come up
        # PROD_API_URL is a repo variable (not secret) set to e.g.
        # https://quantforge-api.onrender.com. If unset, skip the smoke.
        # Render's free plan sleeps after 15 min idle; the first request
        # cold-starts the container which can take 30-60 s, so we use a
        # generous per-attempt timeout and 6-minute ceiling.
        env:
          API_URL: ${{ vars.PROD_API_URL }}
        run: |
          if [ -z "${API_URL:-}" ]; then
            echo "::notice::PROD_API_URL var not set; skipping smoke test."
            exit 0
          fi
          for i in $(seq 1 36); do
            resp=$(curl -sS -m 60 "$API_URL/healthz" || true)
            echo "attempt $i: $resp"
            if echo "$resp" | grep -q '"status":"ok"'; then
              echo "API is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "::error::API never reported healthy at $API_URL/healthz"
          exit 1
      - name: Verify security headers
        env:
          API_URL: ${{ vars.PROD_API_URL }}
        run: |
          if [ -z "${API_URL:-}" ]; then exit 0; fi
          # These three are non-negotiable in prod. Bail loudly if any goes
          # missing — usually means the SecurityHeadersMiddleware regressed.
          headers=$(curl -sS -m 30 -D- -o /dev/null "$API_URL/healthz")
          echo "$headers" | grep -iq '^strict-transport-security:'   || { echo "::error::missing HSTS";          exit 1; }
          echo "$headers" | grep -iq '^x-content-type-options: *nosniff' || { echo "::error::missing nosniff";  exit 1; }
          echo "$headers" | grep -iq '^x-frame-options: *DENY'       || { echo "::error::missing X-Frame-Options"; exit 1; }
          echo "OK: HSTS + nosniff + X-Frame-Options present."
      - name: Verify auth posture matches expectation
        # The `EXPECT_UNAUTH` repo variable is the *single source of truth*
        # for whether prod is in demo mode (auth bypass) or hardened mode.
        #   EXPECT_UNAUTH=false (or unset)  → /v1/* must return 401/403
        #   EXPECT_UNAUTH=true              → /v1/* must return 200; we also
        #                                     assert /v1/meta/dev-key reports
        #                                     dev_mode=false (no real keys
        #                                     leaked) so demo mode is safe.
        # Either way, anything else (5xx, network error) fails the job.
        env:
          API_URL: ${{ vars.PROD_API_URL }}
          EXPECT_UNAUTH: ${{ vars.EXPECT_UNAUTH }}
        run: |
          if [ -z "${API_URL:-}" ]; then exit 0; fi
          code=$(curl -sS -m 30 -o /tmp/body -w "%{http_code}" "$API_URL/v1/meta/version")
          body=$(cat /tmp/body)
          echo "unauthenticated /v1/meta/version -> HTTP $code  body=$body"
          case "${EXPECT_UNAUTH:-false}" in
            true|TRUE|1)
              case "$code" in
                200) echo "OK: demo mode (ALLOW_UNAUTH=true) confirmed." ;;
                *)   echo "::error::expected 200 in demo mode, got $code"; exit 1 ;;
              esac
              # Belt-and-braces: even in demo mode, no real dev key should
              # ever be exposed.
              dev=$(curl -sS -m 30 "$API_URL/v1/meta/dev-key")
              echo "dev-key endpoint -> $dev"
              if echo "$dev" | grep -q '"dev_key":"[A-Za-z0-9]'; then
                echo "::error::demo mode is leaking a dev key"
                exit 1
              fi
              ;;
            *)
              case "$code" in
                401|403) echo "OK: auth is enforced." ;;
                *)       echo "::error::prod allows unauth access (got $code) but EXPECT_UNAUTH is false"; exit 1 ;;
              esac
              ;;
          esac
