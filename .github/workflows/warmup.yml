name: warmup

# Render's free plan sleeps after ~15 minutes of idle traffic. A cold
# wake takes 30-60 seconds, which is a terrible first impression for
# anyone landing on the live demo via a LinkedIn post or HN link. This
# workflow pings /healthz every 14 minutes so the container stays warm
# during ordinary daytime hours. It's free (public repo, ~5s per run)
# and skips automatically if PROD_API_URL isn't set.

on:
  schedule:
    # Every 14 minutes — under Render's 15-minute idle timeout.
    - cron: "*/14 * * * *"
  # Also wake on demand from the Actions tab.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Wake the API
        env:
          API_URL: ${{ vars.PROD_API_URL }}
        run: |
          if [ -z "${API_URL:-}" ]; then
            echo "::notice::PROD_API_URL not set; skipping."
            exit 0
          fi
          # Generous timeout because the first hit may cold-start (30-60s).
          # We don't fail the workflow on a non-2xx — Render restarts and
          # transient blips shouldn't spam the Actions inbox.
          code=$(curl -sS -m 90 -o /tmp/body -w "%{http_code}" "$API_URL/healthz" || echo "000")
          ttfb=$(curl -sS -m 90 -o /dev/null -w "%{time_starttransfer}" "$API_URL/healthz" || echo "?")
          body=$(cat /tmp/body 2>/dev/null || echo "")
          echo "HTTP $code · ttfb $ttfb · $body"
